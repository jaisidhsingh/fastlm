## SEEDING & HARDWARE config
deterministic: False
seed: 123
measure_throughput: False

### DATASETS PATHS
# openwebtext:"/fast/jsingh/data/openwebtext/tokenized-9b-gpt2/train"
# nemotron-cc:"/fast/jsingh/data/nemotron-cc-sample-mtsynth/tokenized_gpt2/ctx_2048/train"

### DATA config
trainset_path: "/fast/jsingh/data/nemotron-cc-sample-mtsynth/tokenized_gpt2/ctx_2048/train"
vocab_size: 50304
seq_len: 2048
intra_doc_masking: True
sampler: "sequential"
sampler_seed: null
num_workers: 4
eval: True
validset_path: "/fast/jsingh/data/nemotron-cc-sample-mtsynth/tokenized_gpt2/ctx_2048/valid"
num_evals: 20
eval_every_steps: -1

### MODEL config
arch_id: "attn"
param_scale_id: "20M"
model: "transformer"
d_model: 256
mlp_class: "glu"
expand: "3.0"
n_layers: 8
n_heads: 4
rms_norm: True
tie_embeddings: True
torch_compile: True
use_flex_attention: False
token_mixer: "attn"
hybrid_mixer_ratio: 1
layer_norm_scaling: False
residual_connection: "add"
attn_gate: True
attn_qk_norm: True
gdn_conv_size: 4
gdn_gate: True
gdn_neg_eigval: True

### TRAINING RUN config

# note: if steps_budget == -1, then steps_budget will internally be step to = chinchilla_token_multiplier * 20 * non_embed_params
token_budget_id: "0.02B"
steps_budget: -1

# note: this is micro batch size if grad_accumulation_steps>1
# note: with ddp, effective batch size = micro_batch_size * grad_accumulation_steps * ddp_world_size
global_batch_size: 16
micro_batch_size: -1
grad_accumulation_steps: 1

# note: choose between {float32, float16, bfloat16}
# note: float16 data type will automatically use a GradScaler
dtype: "bfloat16"

### OPTIMIZER config
optim: "adamw"
fused_optim: True
lr: 1.e-3
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0

scheduler: "wsd"
warmup_steps: 2
cooldown_steps: 4
lr_start: 0.0
lr_end: 1.e-5
lr_end_pct: null

### EXPERIMENT config
log_every_steps: 1
print_progress: True

use_wandb: False
wandb_mode: "offline"
wandb_project: "hparam-sweep"
wandb_entity: "msc-thesis-jaisidh"
wandb_dir: "/fast/jsingh/projects/fastlm/june/wandb"
wandb_run_name: "attn-20M-gbs-256"
exp_name: "attn-20M-gbs-256"

resume: False
resume_step: null
resume_exp_name: null

save_last_checkpoint: False
save_intermediate_checkpoints: False
